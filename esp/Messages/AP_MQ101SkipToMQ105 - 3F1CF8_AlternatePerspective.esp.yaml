  Value: >-
    Some time ago, a black Dragon destroyed Helgen during Ulfric Stormcloak’s execution. With help, you escaped the chaos and made it safely out. 

    You reported Helgen’s fate to the Jarl of Whiterun, and after retrieving a Dragonstone for his Court Mage, joined his guards to investigate a nearby Dragon attack. At the scene, you faced your second Dragon. After a hard-fought victory, you gained the Greybeards’ attention and now journey to High Hrothgar to fulfill your destiny as the Dragonborn.



    Yet you can’t forget the deeds of your companion in Helgen. Without him, you might never have reached Whiterun. Who was it again..?
